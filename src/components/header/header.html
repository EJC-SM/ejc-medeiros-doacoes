<header class="app-header" role="banner">
  <div class="header-brand">
    <img id="header-logo" class="header-logo" src="" alt="Logo EJC Medeiros" hidden />
    <div>
      <h1 id="header-titulo">EJC Medeiros - Doacoes</h1>
      <p class="subtitle">Registro e acompanhamento de doacoes</p>
    </div>
  </div>

  <div class="etapa-toggle" role="group" aria-label="Selecionar etapa">
    <button type="button" class="etapa-btn btn btn--outline" id="btn-etapa-1" data-etapa="1" aria-pressed="false">
      <span class="icon material-symbols-outlined" aria-hidden="true">looks_one</span>
      1a Etapa
    </button>
    <button type="button" class="etapa-btn btn btn--outline" id="btn-etapa-2" data-etapa="2" aria-pressed="false">
      <span class="icon material-symbols-outlined" aria-hidden="true">looks_two</span>
      2a Etapa
    </button>
  </div>
  <p id="etapa-locked-msg" class="etapa-locked-msg" aria-live="polite"></p>
</header>
